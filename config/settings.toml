wal_enabled = false

# Flush enough data concurrently to use the available upload bandwidth.
l0_sst_size_bytes = 134217728
l0_flush_parallelism = 4
max_unflushed_bytes = 4294967296

# Provide enough L0 headroom for larger compaction batches.
l0_max_ssts = 32
l0_max_ssts_per_key = 32

# Embedded notifications handle these transitions. Polling is only a fallback.
manifest_poll_interval = "3600s"

[compactor_options]
poll_interval = "3600s"
commit_compacted_interval = "3600s"
max_concurrent_compactions = 4
worker_heartbeat_timeout = "120s"

[compactor_options.worker]
compactions_poll_interval = "3600s"
heartbeat_interval = "30s"

[compactor_options.scheduler_options]
min_compaction_sources = "8"
max_compaction_sources = "16"

[object_store_cache_options]
cache_on_flush = true
