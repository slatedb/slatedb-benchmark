# SlateDB release defaults are used unless an override is added here.
l0_max_ssts = 64
l0_max_ssts_per_key = 32
l0_flush_parallelism = 16
max_unflushed_bytes = 2147483648

[compactor_options]
poll_interval = "1s"

[compactor_options.worker]
compactions_poll_interval = "1s"

[object_store_cache_options]
part_size_bytes = 1048576
cache_on_flush = true
cache_on_compaction = true
