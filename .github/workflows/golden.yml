name: Prepare golden data

on:
  workflow_dispatch:
    inputs:
      slatedb_ref:
        description: SlateDB tag, branch, or commit
        required: true
        default: v0.14.1
        type: string
      golden_id:
        description: Immutable golden data name
        required: true
        default: golden
        type: string
      scale:
        description: Decimal scale factor
        required: true
        default: "1.0"
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: slatedb-benchmark-environment
  cancel-in-progress: false

jobs:
  build:
    runs-on: codebuild-slatedb-benchmark-${{ github.run_id }}-${{ github.run_attempt }}
    outputs:
      slate_version: ${{ steps.source.outputs.version }}
      slate_commit: ${{ steps.source.outputs.commit }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/checkout@v4
        with:
          repository: slatedb/slatedb
          ref: ${{ inputs.slatedb_ref }}
          path: .slatedb-source
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.89.0
      - name: Resolve SlateDB source
        id: source
        shell: bash
        env:
          SLATEDB_REF: ${{ inputs.slatedb_ref }}
        run: |
          set -euo pipefail
          commit=$(git -C .slatedb-source rev-parse HEAD)
          if [[ "$SLATEDB_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            version=${SLATEDB_REF#v}
          else
            version=sha-${commit:0:12}
          fi
          echo "SLATEDB_COMMIT=$commit" >> "$GITHUB_ENV"
          echo "SLATEDB_VERSION=$version" >> "$GITHUB_ENV"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Configure selected SlateDB source
        shell: bash
        run: |
          set -euo pipefail
          cargo add --quiet --path "$GITHUB_WORKSPACE/.slatedb-source/slatedb" \
            --no-default-features --features aws,foyer,wal_disable,zstd
          cargo add --quiet --path "$GITHUB_WORKSPACE/.slatedb-source/slatedb-common" \
            --features serde
      - name: Build runner
        run: cargo build --release --locked
      - name: Preserve runner binary
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-runner
          path: target/release/slatedb-benchmark
          if-no-files-found: error
          overwrite: true
          retention-days: 7
      - name: Restore local checkout after act
        if: always()
        shell: bash
        run: |
          if [[ ${ACT:-false} == true ]]; then
            git restore Cargo.toml Cargo.lock
          fi

  bulk-load:
    needs: build
    runs-on: codebuild-slatedb-benchmark-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 1440
    environment: benchmark
    concurrency:
      group: golden-${{ inputs.golden_id }}-bulk-load
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: benchmark-runner
          path: bin
      - run: chmod +x bin/slatedb-benchmark
      - name: Configure AWS credentials
        if: ${{ env.ACT != 'true' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Run bulk load
        shell: bash
        env:
          BENCHMARK_SCALE: ${{ inputs.scale }}
          GOLDEN_ID: ${{ inputs.golden_id }}
          SLATEDB_BENCH_BUCKET: ${{ vars.SLATEDB_BENCH_BUCKET }}
        run: |
          set -euo pipefail
          export CLOUD_PROVIDER=aws
          export AWS_REGION=${AWS_REGION:-us-east-1}
          : "${SLATEDB_BENCH_BUCKET:?SLATEDB_BENCH_BUCKET is required}"
          export SLATEDB_BENCH_PREFIX=${SLATEDB_BENCH_PREFIX:-benchmark}
          export SLATEDB_BENCH_REGION=${SLATEDB_BENCH_REGION:-$AWS_REGION}
          export SLATEDB_BENCH_RUNNER_TYPE=${SLATEDB_BENCH_RUNNER_TYPE:-codebuild-linux-xlarge}
          bin/slatedb-benchmark run \
            --task bulk-load \
            --golden "$GOLDEN_ID" \
            --scale "$BENCHMARK_SCALE" \
            --output .runs/preparation/bulk-load
      - name: Preserve result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-bulk-load
          path: .runs/preparation/bulk-load
          if-no-files-found: ignore
          overwrite: true

  compaction:
    needs: [build, bulk-load]
    runs-on: codebuild-slatedb-benchmark-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 1440
    environment: benchmark
    concurrency:
      group: golden-${{ inputs.golden_id }}-compaction
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: benchmark-runner
          path: bin
      - run: chmod +x bin/slatedb-benchmark
      - name: Configure AWS credentials
        if: ${{ env.ACT != 'true' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Run compaction
        shell: bash
        env:
          BENCHMARK_SCALE: ${{ inputs.scale }}
          GOLDEN_ID: ${{ inputs.golden_id }}
          SLATEDB_BENCH_BUCKET: ${{ vars.SLATEDB_BENCH_BUCKET }}
        run: |
          set -euo pipefail
          export CLOUD_PROVIDER=aws
          export AWS_REGION=${AWS_REGION:-us-east-1}
          : "${SLATEDB_BENCH_BUCKET:?SLATEDB_BENCH_BUCKET is required}"
          export SLATEDB_BENCH_PREFIX=${SLATEDB_BENCH_PREFIX:-benchmark}
          export SLATEDB_BENCH_REGION=${SLATEDB_BENCH_REGION:-$AWS_REGION}
          export SLATEDB_BENCH_RUNNER_TYPE=${SLATEDB_BENCH_RUNNER_TYPE:-codebuild-linux-xlarge}
          bin/slatedb-benchmark run \
            --task compaction \
            --golden "$GOLDEN_ID" \
            --scale "$BENCHMARK_SCALE" \
            --output .runs/preparation/compaction
      - name: Preserve result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-compaction
          path: .runs/preparation/compaction
          if-no-files-found: ignore
          overwrite: true
