name: Run benchmarks

on:
  workflow_dispatch:
    inputs:
      golden_id:
        description: Existing golden data name
        required: true
        default: slatedb-v0.14.1-001
        type: string
      publish:
        description: Publish a full-scale result
        required: true
        default: false
        type: boolean
      scale:
        description: Decimal scale factor
        required: true
        default: "1.0"
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: slatedb-benchmark-environment
  cancel-in-progress: false

jobs:
  validate-golden:
    runs-on: ubuntu-latest
    environment: benchmark
    outputs:
      slate_version: ${{ steps.validate.outputs.version }}
      slate_commit: ${{ steps.validate.outputs.commit }}
      started_at: ${{ steps.validate.outputs.started_at }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install AWS CLI for act
        if: ${{ env.ACT == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip \
            --output /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install
      - name: Fetch preparation results
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TIGRIS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TIGRIS_SECRET_ACCESS_KEY }}
          GOLDEN_ID: ${{ inputs.golden_id }}
          TIGRIS_BUCKET_PREFIX: ${{ vars.TIGRIS_BUCKET_PREFIX }}
        run: |
          set -euo pipefail
          endpoint=${AWS_ENDPOINT_URL_S3:-https://t3.storage.dev}
          bucket=${SLATEDB_BENCH_BUCKET:-${TIGRIS_BUCKET_PREFIX}-slatedb}
          prefix=${SLATEDB_BENCH_PREFIX:-benchmark}
          for task in bulk-load full-compaction; do
            mkdir -p ".runs/bundle/preparation/$task"
            aws s3 cp --endpoint-url "$endpoint" --only-show-errors \
              "s3://$bucket/$prefix/goldens/$GOLDEN_ID/$task/result.json" \
              ".runs/bundle/preparation/$task/result.json"
          done
      - name: Validate preparation results
        id: validate
        shell: bash
        env:
          BENCHMARK_SCALE: ${{ inputs.scale }}
          GH_TOKEN: ${{ github.token }}
          GOLDEN_ID: ${{ inputs.golden_id }}
          PUBLISH_BENCHMARK: ${{ inputs.publish }}
        run: |
          set -euo pipefail
          if [[ "$PUBLISH_BENCHMARK" == true && "$BENCHMARK_SCALE" != 1.0 ]]; then
            echo "published runs require scale 1.0" >&2
            exit 1
          fi
          bulk=.runs/bundle/preparation/bulk-load/result.json
          full=.runs/bundle/preparation/full-compaction/result.json
          jq -e --arg golden "$GOLDEN_ID" \
            '.status == "ok" and .task == "bulk-load" and .golden_id == $golden' "$bulk" >/dev/null
          jq -e --arg golden "$GOLDEN_ID" \
            '.status == "ok" and .task == "full-compaction" and .golden_id == $golden' "$full" >/dev/null
          for result in "$bulk" "$full"; do
            if ! jq -e '
              .recorded_interval_ns > 0 and
              (.environment | type == "object") and
              (.application | type == "object") and
              (.object_store | type == "object") and
              (.process | type == "object") and
              (.machine | type == "object")
            ' "$result" >/dev/null; then
              echo "preparation result has no recorded metrics; rerun golden.yml" >&2
              exit 1
            fi
          done
          commit=$(jq -r .source.slate_commit "$full")
          version=$(jq -r .source.slate_version "$full")
          test "$commit" = "$(jq -r .source.slate_commit "$bulk")"
          jq -e --argjson scale "$BENCHMARK_SCALE" \
            '.configuration.scale == $scale' "$bulk" >/dev/null
          jq -e --argjson scale "$BENCHMARK_SCALE" \
            '.configuration.scale == $scale' "$full" >/dev/null
          test "$(jq -r .source_checkpoint.checkpoint_id "$full")" = \
            "$(jq -r .checkpoint.checkpoint_id "$bulk")"
          if [[ ${ACT:-false} == true ]]; then
            started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          else
            started_at=$(gh api \
              "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              --jq .created_at)
          fi
          echo "commit=$commit" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "started_at=$started_at" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: golden-results
          path: .runs/bundle/preparation
          if-no-files-found: error
          overwrite: true

  build:
    needs: validate-golden
    runs-on: warp-ubuntu-latest-x64-16x
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/checkout@v4
        with:
          repository: slatedb/slatedb
          ref: ${{ needs.validate-golden.outputs.slate_commit }}
          path: .slatedb-source
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.89.0
      - name: Configure recorded SlateDB source
        shell: bash
        run: |
          set -euo pipefail
          cargo add --quiet --path "$GITHUB_WORKSPACE/.slatedb-source/slatedb" \
            --no-default-features --features aws,foyer,wal_disable,zstd
          cargo add --quiet --path "$GITHUB_WORKSPACE/.slatedb-source/slatedb-common" \
            --features serde
      - name: Build runner
        env:
          SLATEDB_COMMIT: ${{ needs.validate-golden.outputs.slate_commit }}
          SLATEDB_VERSION: ${{ needs.validate-golden.outputs.slate_version }}
        run: cargo build --release --locked
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-runner
          path: target/release/slatedb-benchmark
          if-no-files-found: error
          overwrite: true
          retention-days: 7
      - name: Restore local checkout after act
        if: always()
        shell: bash
        run: |
          if [[ ${ACT:-false} == true ]]; then
            git restore Cargo.toml Cargo.lock
          fi

  workloads:
    needs: [validate-golden, build]
    runs-on: warp-ubuntu-latest-x64-16x
    timeout-minutes: 1440
    environment: benchmark
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        task:
          - idle
          - point-read-uniform
          - point-read-skewed
          - point-read-missing
          - read-heavy
          - balanced
          - update-heavy
          - range-scan
          - sustained-ingest
          - transaction-contention
    concurrency:
      group: session-${{ github.run_id }}-${{ matrix.task }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: benchmark-runner
          path: bin
      - run: chmod +x bin/slatedb-benchmark
      - name: Run ${{ matrix.task }}
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TIGRIS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TIGRIS_SECRET_ACCESS_KEY }}
          BENCHMARK_SCALE: ${{ inputs.scale }}
          BENCHMARK_SESSION: github-${{ github.run_id }}
          BENCHMARK_TASK: ${{ matrix.task }}
          GOLDEN_ID: ${{ inputs.golden_id }}
          TIGRIS_BUCKET_PREFIX: ${{ vars.TIGRIS_BUCKET_PREFIX }}
          SLATEDB_BENCH_PUBLISHED: ${{ inputs.publish }}
        run: |
          set -euo pipefail
          export CLOUD_PROVIDER=aws
          export AWS_REGION=${AWS_REGION:-auto}
          export AWS_ENDPOINT_URL_S3=${AWS_ENDPOINT_URL_S3:-https://t3.storage.dev}
          export AWS_ENDPOINT_URL_IAM=${AWS_ENDPOINT_URL_IAM:-https://iam.storage.dev}
          export SLATEDB_BENCH_BUCKET=${SLATEDB_BENCH_BUCKET:-${TIGRIS_BUCKET_PREFIX}-slatedb}
          export SLATEDB_BENCH_PREFIX=${SLATEDB_BENCH_PREFIX:-benchmark}
          export SLATEDB_BENCH_REGION=${SLATEDB_BENCH_REGION:-fra}
          export SLATEDB_BENCH_RUNNER_TYPE=${SLATEDB_BENCH_RUNNER_TYPE:-warp-ubuntu-latest-x64-16x}
          bin/slatedb-benchmark run \
            --task "$BENCHMARK_TASK" \
            --golden "$GOLDEN_ID" \
            --session "$BENCHMARK_SESSION" \
            --scale "$BENCHMARK_SCALE" \
            --output ".runs/workload/$BENCHMARK_TASK"
      - name: Preserve workload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workload-${{ matrix.task }}
          path: .runs/workload
          if-no-files-found: ignore
          overwrite: true

  bundle:
    needs: [validate-golden, workloads]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: golden-results
          path: .runs/bundle/preparation
      - uses: actions/download-artifact@v4
        with:
          pattern: workload-*
          path: .runs/bundle/workload
          merge-multiple: true
      - name: Assemble release bundle
        env:
          BENCHMARK_STARTED_AT: ${{ needs.validate-golden.outputs.started_at }}
          GOLDEN_ID: ${{ inputs.golden_id }}
        run: |
          python3 scripts/bundle.py \
            --input .runs/bundle \
            --output .runs/release/results \
            --golden "$GOLDEN_ID" \
            --started-at "$BENCHMARK_STARTED_AT" \
            --max-parallel 4
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: .runs/release/results
          if-no-files-found: error
          overwrite: true

  publish:
    needs: bundle
    if: inputs.publish
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    concurrency:
      group: benchmark-publish
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: .runs/release/results
      - name: Check out current main for publication
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: publish
      - name: Publish benchmark results
        run: ./scripts/publish.sh .runs/release/results publish
      - name: Deploy benchmark website
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "pages.yml",
              ref: "main",
            });

  cleanup:
    needs: [bundle, publish]
    if: >-
      always() &&
      needs.bundle.result == 'success' &&
      (needs.publish.result == 'success' || needs.publish.result == 'skipped')
    runs-on: ubuntu-latest
    environment: benchmark
    steps:
      - name: Install AWS CLI for act
        if: ${{ env.ACT == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip \
            --output /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install
      - name: Delete benchmark session data
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TIGRIS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TIGRIS_SECRET_ACCESS_KEY }}
          TIGRIS_BUCKET_PREFIX: ${{ vars.TIGRIS_BUCKET_PREFIX }}
        run: |
          set -euo pipefail
          endpoint=${AWS_ENDPOINT_URL_S3:-https://t3.storage.dev}
          bucket=${SLATEDB_BENCH_BUCKET:-${TIGRIS_BUCKET_PREFIX}-slatedb}
          prefix=${SLATEDB_BENCH_PREFIX:-benchmark}
          for task in \
            idle point-read-uniform point-read-skewed point-read-missing \
            read-heavy balanced update-heavy range-scan sustained-ingest \
            transaction-contention; do
            aws s3 rm --endpoint-url "$endpoint" --only-show-errors --recursive \
              "s3://$bucket/$prefix/sessions/github-${{ github.run_id }}/$task/database/"
          done
