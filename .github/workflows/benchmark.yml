name: Run benchmarks

on:
  workflow_dispatch:
    inputs:
      slatedb_ref:
        description: SlateDB tag, branch, or commit to benchmark
        required: true
        default: main
        type: string
      golden_id:
        description: Existing golden data name
        required: true
        default: golden
        type: string
      publish:
        description: Publish results to website
        required: true
        default: true
        type: boolean
      scale:
        description: Decimal scale factor
        required: true
        default: "1.0"
        type: string

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: slatedb-benchmark-environment
  cancel-in-progress: false

jobs:
  validate-golden:
    runs-on: ubuntu-latest
    environment: benchmark
    outputs:
      started_at: ${{ steps.validate.outputs.started_at }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install AWS CLI for act
        if: ${{ env.ACT == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip \
            --output /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install
      - name: Configure AWS credentials
        if: ${{ env.ACT != 'true' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Fetch preparation results
        shell: bash
        env:
          GOLDEN_ID: ${{ inputs.golden_id }}
          SLATEDB_BENCH_BUCKET: ${{ vars.SLATEDB_BENCH_BUCKET }}
        run: |
          set -euo pipefail
          bucket=${SLATEDB_BENCH_BUCKET:?SLATEDB_BENCH_BUCKET is required}
          prefix=${SLATEDB_BENCH_PREFIX:-benchmark}
          for task in bulk-load compaction; do
            mkdir -p ".runs/bundle/preparation/$task"
            aws s3 cp --only-show-errors \
              "s3://$bucket/$prefix/goldens/$GOLDEN_ID/$task/result.json" \
              ".runs/bundle/preparation/$task/result.json"
          done
      - name: Validate preparation results
        id: validate
        shell: bash
        env:
          BENCHMARK_SCALE: ${{ inputs.scale }}
          GH_TOKEN: ${{ github.token }}
          GOLDEN_ID: ${{ inputs.golden_id }}
          PUBLISH_BENCHMARK: ${{ inputs.publish }}
        run: |
          set -euo pipefail
          if [[ "$PUBLISH_BENCHMARK" == true && "$BENCHMARK_SCALE" != 1.0 ]]; then
            echo "published runs require scale 1.0" >&2
            exit 1
          fi
          bulk=.runs/bundle/preparation/bulk-load/result.json
          compaction=.runs/bundle/preparation/compaction/result.json
          jq -e --arg golden "$GOLDEN_ID" \
            '.status == "ok" and .task == "bulk-load" and .golden_id == $golden' "$bulk" >/dev/null
          jq -e --arg golden "$GOLDEN_ID" \
            '.status == "ok" and .task == "compaction" and .golden_id == $golden' "$compaction" >/dev/null
          for result in "$bulk" "$compaction"; do
            if ! jq -e '
              .recorded_interval_ns > 0 and
              (.environment | type == "object") and
              (.application | type == "object") and
              (.object_store | type == "object") and
              (.process | type == "object") and
              (.machine | type == "object")
            ' "$result" >/dev/null; then
              echo "preparation result has no recorded metrics; rerun golden.yml" >&2
              exit 1
            fi
          done
          test "$(jq -r .source.slate_commit "$compaction")" = \
            "$(jq -r .source.slate_commit "$bulk")"
          jq -e --argjson scale "$BENCHMARK_SCALE" \
            '.configuration.scale == $scale' "$bulk" >/dev/null
          jq -e --argjson scale "$BENCHMARK_SCALE" \
            '.configuration.scale == $scale' "$compaction" >/dev/null
          test "$(jq -r .source_checkpoint.checkpoint_id "$compaction")" = \
            "$(jq -r .checkpoint.checkpoint_id "$bulk")"
          if [[ ${ACT:-false} == true ]]; then
            started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          else
            started_at=$(gh api \
              "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              --jq .created_at)
          fi
          echo "started_at=$started_at" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: golden-results
          path: .runs/bundle/preparation
          if-no-files-found: error
          overwrite: true

  build:
    needs: validate-golden
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/checkout@v4
        with:
          repository: slatedb/slatedb
          ref: ${{ inputs.slatedb_ref }}
          path: .slatedb-source
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.89.0
      - name: Apply SlateDB patch
        id: patches
        run: bash scripts/apply-slatedb-patch.sh .slatedb-source
      - name: Resolve SlateDB source
        id: source
        shell: bash
        env:
          SLATEDB_PATCHED: ${{ steps.patches.outputs.applied }}
          SLATEDB_REF: ${{ inputs.slatedb_ref }}
        run: |
          set -euo pipefail
          commit=$(git -C .slatedb-source rev-parse HEAD)
          if [[ "$SLATEDB_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            version=${SLATEDB_REF#v}
          else
            version=sha-${commit:0:12}
          fi
          if [[ "$SLATEDB_PATCHED" == true ]]; then
            version="$version-patched"
          fi
          echo "commit=$commit" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Configure selected SlateDB source
        shell: bash
        run: |
          set -euo pipefail
          cargo add --quiet --path "$GITHUB_WORKSPACE/.slatedb-source/slatedb" \
            --no-default-features --features aws,foyer,wal_disable,zstd
          cargo add --quiet --path "$GITHUB_WORKSPACE/.slatedb-source/slatedb-common" \
            --features serde
      - name: Build runner
        env:
          SLATEDB_COMMIT: ${{ steps.source.outputs.commit }}
          SLATEDB_VERSION: ${{ steps.source.outputs.version }}
        run: cargo build --release --locked
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-runner
          path: target/release/slatedb-benchmark
          if-no-files-found: error
          overwrite: true
          retention-days: 7
      - name: Restore local checkout after act
        if: always()
        shell: bash
        run: |
          if [[ ${ACT:-false} == true ]]; then
            git restore Cargo.toml Cargo.lock
          fi

  transfer-capacity:
    needs: validate-golden
    runs-on: codebuild-slatedb-benchmark-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 60
    environment: benchmark
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      WARP_VERSION: v1.5.0
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: 1.25.9
          cache: false
      - name: Install Warp
        shell: bash
        run: |
          set -euo pipefail
          warp_bin_dir="${RUNNER_TEMP:-/tmp}/warp-bin"
          mkdir -p "$warp_bin_dir"
          GOBIN="$warp_bin_dir" go install "github.com/minio/warp@${WARP_VERSION}"
          echo "$warp_bin_dir" >> "$GITHUB_PATH"
          "$warp_bin_dir/warp" --version
      - name: Install AWS CLI for act
        if: ${{ env.ACT == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip \
            --output /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install
      - name: Configure AWS credentials
        if: ${{ env.ACT != 'true' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Install runner diagnostics
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v traceroute >/dev/null 2>&1; then
            if ! sudo apt-get update -qq || \
              ! sudo apt-get install -y --no-install-recommends traceroute; then
              echo "::warning::traceroute installation failed"
            fi
          fi
      - name: Record runner diagnostics
        shell: bash
        run: |
          set -uo pipefail

          echo "::group::Host"
          hostname
          uname -a
          cat /etc/os-release
          systemd-detect-virt || true
          for field in sys_vendor product_name; do
            if [[ -r /sys/devices/virtual/dmi/id/$field ]]; then
              printf '%s: ' "$field"
              cat "/sys/devices/virtual/dmi/id/$field"
            fi
          done
          echo "::endgroup::"

          echo "::group::CPU"
          lscpu
          echo "::endgroup::"

          echo "::group::Memory"
          free -h
          echo "::endgroup::"

          echo "::group::Disk"
          lsblk -o NAME,MODEL,SIZE,TYPE,FSTYPE,MOUNTPOINTS
          df -h
          du -sh "$GITHUB_WORKSPACE"
          echo "::endgroup::"

          echo "::group::Network"
          if command -v ip >/dev/null 2>&1; then
            ip -brief address
            ip route
          else
            echo "::warning::ip command unavailable"
          fi
          echo "Public egress:"
          curl --fail --location --silent --show-error --max-time 10 \
            https://ipinfo.io/json || true
          echo
          s3_host="s3.${AWS_REGION}.amazonaws.com"
          echo "Amazon S3 DNS:"
          getent ahosts "$s3_host" || true
          echo "Amazon S3 connection:"
          curl --location --silent --show-error --max-time 20 \
            --output /dev/null \
            --write-out 'remote_ip=%{remote_ip} http_code=%{http_code} connect_seconds=%{time_connect} tls_seconds=%{time_appconnect} total_seconds=%{time_total}\n' \
            "https://$s3_host" || true
          echo "::endgroup::"

          echo "::group::TCP traceroute to Amazon S3"
          sudo traceroute -T -p 443 -m 20 -w 2 -q 1 "$s3_host" || true
          echo "::endgroup::"
      - name: Measure Amazon S3 transfer capacity
        shell: bash
        env:
          BENCHMARK_SCALE: ${{ inputs.scale }}
          SLATEDB_BENCH_BUCKET: ${{ vars.SLATEDB_BENCH_BUCKET }}
        run: |
          set -euo pipefail
          : "${SLATEDB_BENCH_BUCKET:?SLATEDB_BENCH_BUCKET is required}"
          export SLATEDB_BENCH_PREFIX=${SLATEDB_BENCH_PREFIX:-benchmark}
          export SLATEDB_BENCH_REGION=${SLATEDB_BENCH_REGION:-$AWS_REGION}
          export SLATEDB_BENCH_RUNNER_TYPE=${SLATEDB_BENCH_RUNNER_TYPE:-codebuild-linux-xlarge}
          ./scripts/transfer-capacity.sh .runs/transfer-capacity/result.json
      - uses: actions/upload-artifact@v4
        with:
          name: transfer-capacity
          path: .runs/transfer-capacity
          if-no-files-found: error
          overwrite: true

  workloads:
    needs: [validate-golden, build, transfer-capacity]
    runs-on: codebuild-slatedb-benchmark-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 1440
    environment: benchmark
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        task:
          - sustained-ingest
          # - idle
          # - point-read-uniform
          # - point-read-skewed
          # - point-read-missing
          # - read-heavy
          # - balanced
          # - update-heavy
          # - range-scan
          # - transaction-contention
    concurrency:
      group: session-${{ github.run_id }}-${{ matrix.task }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: benchmark-runner
          path: bin
      - run: chmod +x bin/slatedb-benchmark
      - name: Configure AWS credentials
        if: ${{ env.ACT != 'true' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Run ${{ matrix.task }}
        shell: bash
        env:
          BENCHMARK_ACTIONS_JOB_ID: ${{ job.check_run_id }}
          BENCHMARK_SCALE: ${{ inputs.scale }}
          BENCHMARK_SESSION: github-${{ github.run_id }}
          BENCHMARK_TASK: ${{ matrix.task }}
          GOLDEN_ID: ${{ inputs.golden_id }}
          SLATEDB_BENCH_BUCKET: ${{ vars.SLATEDB_BENCH_BUCKET }}
          SLATEDB_BENCH_PUBLISHED: ${{ inputs.publish }}
        run: |
          set -euo pipefail
          if [[ ${ACT:-false} != true ]]; then
            export BENCHMARK_ACTIONS_LOG_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/job/$BENCHMARK_ACTIONS_JOB_ID"
          fi
          unset BENCHMARK_ACTIONS_JOB_ID
          export CLOUD_PROVIDER=aws
          export AWS_REGION=${AWS_REGION:-us-east-1}
          : "${SLATEDB_BENCH_BUCKET:?SLATEDB_BENCH_BUCKET is required}"
          export SLATEDB_BENCH_PREFIX=${SLATEDB_BENCH_PREFIX:-benchmark}
          export SLATEDB_BENCH_REGION=${SLATEDB_BENCH_REGION:-$AWS_REGION}
          export SLATEDB_BENCH_RUNNER_TYPE=${SLATEDB_BENCH_RUNNER_TYPE:-codebuild-linux-xlarge}
          bin/slatedb-benchmark run \
            --task "$BENCHMARK_TASK" \
            --golden "$GOLDEN_ID" \
            --session "$BENCHMARK_SESSION" \
            --scale "$BENCHMARK_SCALE" \
            --output ".runs/workload/$BENCHMARK_TASK"
      - name: Preserve workload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workload-${{ matrix.task }}
          path: .runs/workload
          if-no-files-found: ignore
          overwrite: true

  bundle:
    needs: [validate-golden, transfer-capacity, workloads]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: golden-results
          path: .runs/bundle/preparation
      - uses: actions/download-artifact@v4
        with:
          pattern: workload-*
          path: .runs/bundle/workload
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: transfer-capacity
          path: .runs/bundle/transfer-capacity
      - name: Assemble release bundle
        env:
          BENCHMARK_STARTED_AT: ${{ needs.validate-golden.outputs.started_at }}
          GOLDEN_ID: ${{ inputs.golden_id }}
        run: |
          python3 scripts/bundle.py \
            --input .runs/bundle \
            --output .runs/release/results \
            --golden "$GOLDEN_ID" \
            --started-at "$BENCHMARK_STARTED_AT"
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: .runs/release/results
          if-no-files-found: error
          overwrite: true

  publish:
    needs: bundle
    if: inputs.publish
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    concurrency:
      group: benchmark-publish
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: .runs/release/results
      - name: Check out current main for publication
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: publish
      - name: Publish benchmark results
        run: ./scripts/publish.sh .runs/release/results publish
      - name: Deploy benchmark website
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "pages.yml",
              ref: "main",
            });

  cleanup:
    needs: [bundle, publish]
    if: >-
      always() &&
      needs.bundle.result == 'success' &&
      (needs.publish.result == 'success' || needs.publish.result == 'skipped')
    runs-on: ubuntu-latest
    environment: benchmark
    steps:
      - name: Install AWS CLI for act
        if: ${{ env.ACT == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip \
            --output /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install
      - name: Configure AWS credentials
        if: ${{ env.ACT != 'true' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Delete benchmark session data
        shell: bash
        env:
          SLATEDB_BENCH_BUCKET: ${{ vars.SLATEDB_BENCH_BUCKET }}
        run: |
          set -euo pipefail
          bucket=${SLATEDB_BENCH_BUCKET:?SLATEDB_BENCH_BUCKET is required}
          prefix=${SLATEDB_BENCH_PREFIX:-benchmark}
          for task in \
            idle point-read-uniform point-read-skewed point-read-missing \
            read-heavy balanced update-heavy range-scan sustained-ingest \
            transaction-contention; do
            aws s3 rm --only-show-errors --recursive \
              "s3://$bucket/$prefix/sessions/github-${{ github.run_id }}/$task/database/"
          done
