name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --locked
      - name: Check support files
        shell: bash
        run: |
          set -euo pipefail
          jq empty schema/*.json
          PYTHONPYCACHEPREFIX=/tmp/slatedb-benchmark-pycache \
            python3 -m py_compile scripts/bundle.py
          PYTHONPYCACHEPREFIX=/tmp/slatedb-benchmark-pycache \
            python3 -m unittest scripts.test_bundle
          bash -n scripts/*.sh
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci --ignore-scripts
        working-directory: website
      - run: npm run build
        working-directory: website

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install act
        shell: bash
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/nektos/act/releases/download/v0.2.89/act_Linux_x86_64.tar.gz \
            | sudo tar -xz -C /usr/local/bin act
      - run: ./scripts/smoke.sh
        env:
          GITHUB_TOKEN: ${{ github.token }}

  slatedb-compatibility:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        slate-ref: [v0.14.1, main]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/checkout@v4
        with:
          repository: slatedb/slatedb
          ref: ${{ matrix.slate-ref }}
          path: .slatedb-source
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.89.0
      - name: Apply SlateDB main cache patch
        if: ${{ matrix.slate-ref == 'main' }}
        run: git -C .slatedb-source apply --unidiff-zero "$GITHUB_WORKSPACE/patches/slatedb-main-cache-range-copy.patch"
      - name: Configure selected SlateDB source
        run: |
          cargo add --quiet --path "$GITHUB_WORKSPACE/.slatedb-source/slatedb" \
            --no-default-features --features aws,foyer,wal_disable,zstd
          cargo add --quiet --path "$GITHUB_WORKSPACE/.slatedb-source/slatedb-common" --features serde
      - run: cargo check --locked
