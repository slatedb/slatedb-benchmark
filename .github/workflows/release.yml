# Generated by `slatedb-benchmark generate-workflow`. Do not edit.
name: Benchmark release

on:
  workflow_dispatch:
    inputs:
      slate_ref:
        description: SlateDB tag or commit
        required: true
        default: v0.14.1

permissions:
  contents: read

concurrency:
  group: benchmark-release
  cancel-in-progress: false

jobs:
  build-runner:
    runs-on: warp-ubuntu-latest-x64-16x
    outputs:
      slate_version: ${{ steps.selected-source.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: slatedb/slatedb
          ref: ${{ inputs.slate_ref }}
          path: .slatedb-source
      - uses: dtolnay/rust-toolchain@1.89.0
      - name: Configure selected SlateDB source
        run: scripts/select-slate-source.sh "$GITHUB_WORKSPACE/.slatedb-source"
      - name: Record selected source
        id: selected-source
        env:
          SLATE_REF: ${{ inputs.slate_ref }}
        run: |
          commit="$(git -C .slatedb-source rev-parse HEAD)"
          if [[ "$SLATE_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            version="${SLATE_REF#v}"
          else
            version="sha-${commit:0:12}"
          fi
          echo "SLATEDB_COMMIT=$commit" >> "$GITHUB_ENV"
          echo "SLATEDB_VERSION=$version" >> "$GITHUB_ENV"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Check selected SlateDB source
        run: cargo check --locked
      - name: Build runner
        run: cargo build --release --locked
      - name: Preserve runner binary
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-runner
          path: target/release/slatedb-benchmark
          overwrite: true
          retention-days: 7

  benchmark-rocksdb:
    name: Benchmark rocksdb
    needs: build-runner
    permissions:
      actions: write
      contents: write
    runs-on: warp-ubuntu-latest-x64-16x
    timeout-minutes: 1440
    environment: benchmark
    env:
      CLOUD_PROVIDER: aws
      AWS_ACCESS_KEY_ID: ${{ secrets.TIGRIS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TIGRIS_SECRET_ACCESS_KEY }}
      AWS_REGION: auto
      AWS_ENDPOINT_URL_S3: https://t3.storage.dev
      AWS_ENDPOINT_URL_IAM: https://iam.storage.dev
      SLATEDB_BENCH_BUCKET: ${{ vars.TIGRIS_BUCKET_PREFIX }}-rocksdb
      SLATEDB_BENCH_PREFIX: release/${{ needs.build-runner.outputs.slate_version }}
      SLATEDB_BENCH_REGION: fra
      SLATEDB_BENCH_RUNNER_TYPE: warp-ubuntu-latest-x64-16x
    steps:
      - uses: actions/checkout@v4
      - name: Download runner binary
        uses: actions/download-artifact@v4
        with:
          name: benchmark-runner
          path: bin
      - name: Prepare runner binary
        run: chmod +x bin/slatedb-benchmark
      - name: Check out current main for publication
        uses: actions/checkout@v4
        with:
          ref: main
          path: publish
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: publish/website/package-lock.json
      - name: Run rocksdb suite
        run: |
          bin/slatedb-benchmark run \
            --suite "rocksdb" \
            --session "github-${{ github.run_id }}-rocksdb" \
            --output ".runs/rocksdb"
          bin/slatedb-benchmark validate --output ".runs/rocksdb"
      - name: Publish rocksdb suite
        run: |
          ./scripts/publish-results.sh \
            ".runs/rocksdb" \
            "${{ needs.build-runner.outputs.slate_version }}" \
            "rocksdb" \
            publish
      - name: Deploy rocksdb suite
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "pages.yml",
              ref: "main",
            });
      - name: Preserve suite artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ needs.build-runner.outputs.slate_version }}-rocksdb
          path: .runs/rocksdb
          if-no-files-found: ignore
          overwrite: true

  benchmark-slatedb:
