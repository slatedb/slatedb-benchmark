name: Benchmark release

on:
  workflow_dispatch:
    inputs:
      slate_ref:
        description: SlateDB tag or commit
        required: true
        default: v0.14.1
      slate_version:
        description: Version used in result paths
        required: true
        default: 0.14.1

permissions:
  contents: write

concurrency:
  group: benchmark-release
  cancel-in-progress: false

jobs:
  build-runner:
    runs-on: warp-ubuntu-latest-x64-16x
    env:
      SLATEDB_VERSION: ${{ inputs.slate_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: slatedb/slatedb
          ref: ${{ inputs.slate_ref }}
          path: .slatedb-source
      - uses: dtolnay/rust-toolchain@1.89.0
      - name: Configure selected SlateDB source
        run: ./scripts/use-local-slatedb.sh "$GITHUB_WORKSPACE/.slatedb-source"
      - name: Record selected commit
        run: echo "SLATEDB_COMMIT=$(git -C .slatedb-source rev-parse HEAD)" >> "$GITHUB_ENV"
      - name: Check selected SlateDB source
        run: cargo check --workspace --locked
      - name: Build runner
        run: cargo build --release --locked --manifest-path runner/Cargo.toml
      - name: Preserve runner binary
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-runner
          path: target/release/slatedb-benchmark
          overwrite: true
          retention-days: 7

  benchmark:
    needs: build-runner
    name: Benchmark ${{ matrix.profile }}
    runs-on: warp-ubuntu-latest-x64-16x
    environment: benchmark
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        profile: [rocksdb, ycsb, slatedb]
    env:
      CLOUD_PROVIDER: aws
      AWS_ACCESS_KEY_ID: ${{ secrets.TIGRIS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TIGRIS_SECRET_ACCESS_KEY }}
      AWS_REGION: auto
      AWS_ENDPOINT_URL_S3: https://fly.storage.tigris.dev
      SLATEDB_BENCH_BUCKET: ${{ secrets.TIGRIS_BUCKET }}
      SLATEDB_BENCH_PREFIX: release/${{ inputs.slate_version }}/${{ matrix.profile }}
      SLATEDB_BENCH_REGION: fra
      SLATEDB_BENCH_RUNNER_TYPE: warp-ubuntu-latest-x64-16x
    steps:
      - uses: actions/checkout@v4
      - name: Download runner binary
        uses: actions/download-artifact@v4
        with:
          name: benchmark-runner
          path: bin
      - name: Prepare runner binary
        run: chmod +x bin/slatedb-benchmark
      - name: Run ${{ matrix.profile }} profile
        run: |
          bin/slatedb-benchmark run \
            --profile "${{ matrix.profile }}" \
            --output ".runs/${{ matrix.profile }}"
      - name: Validate ${{ matrix.profile }} output
        run: bin/slatedb-benchmark validate --output ".runs/${{ matrix.profile }}"
      - name: Preserve profile artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ inputs.slate_version }}-${{ matrix.profile }}
          path: .runs/${{ matrix.profile }}
          if-no-files-found: ignore
          overwrite: true
      - name: Check out current main for publication
        uses: actions/checkout@v4
        with:
          ref: main
          path: publish
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: publish/site/package-lock.json
      - name: Publish ${{ matrix.profile }} results
        run: |
          ./scripts/publish-results.sh \
            ".runs/${{ matrix.profile }}" \
            "${{ inputs.slate_version }}" \
            "${{ matrix.profile }}" \
            publish
