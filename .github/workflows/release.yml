name: Benchmark release

on:
  workflow_dispatch:
    inputs:
      slate_ref:
        description: SlateDB tag or commit
        required: true
        default: v0.14.1

permissions:
  contents: read

concurrency:
  group: benchmark-release
  cancel-in-progress: false

jobs:
  build-runner:
    runs-on: warp-ubuntu-latest-x64-16x
    outputs:
      slate_version: ${{ steps.selected-source.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/checkout@v4
        with:
          repository: slatedb/slatedb
          ref: ${{ inputs.slate_ref }}
          path: .slatedb-source
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.89.0
      - name: Configure selected SlateDB source
        run: |
          cargo add --quiet --path "$GITHUB_WORKSPACE/.slatedb-source/slatedb" --features aws,wal_disable,zstd
          cargo add --quiet --path "$GITHUB_WORKSPACE/.slatedb-source/slatedb-common" --features serde
      - name: Record selected source
        id: selected-source
        env:
          SLATE_REF: ${{ inputs.slate_ref }}
        run: |
          commit="$(git -C .slatedb-source rev-parse HEAD)"
          if [[ "$SLATE_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            version="${SLATE_REF#v}"
          else
            version="sha-${commit:0:12}"
          fi
          echo "SLATEDB_COMMIT=$commit" >> "$GITHUB_ENV"
          echo "SLATEDB_VERSION=$version" >> "$GITHUB_ENV"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Check selected SlateDB source
        run: cargo check --locked
      - name: Build runner
        run: cargo build --release --locked
      - name: Preserve runner binary
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-runner
          path: target/release/slatedb-benchmark
          overwrite: true
          retention-days: 7

  rocksdb:
    name: RocksDB suite
    needs: build-runner
    permissions:
      actions: write
      contents: write
    uses: ./.github/workflows/benchmark-suite.yml
    with:
      suite: rocksdb
      slate_version: ${{ needs.build-runner.outputs.slate_version }}
    secrets: inherit

  slatedb:
    name: SlateDB suite
    needs: build-runner
    permissions:
      actions: write
      contents: write
    uses: ./.github/workflows/benchmark-suite.yml
    with:
      suite: slatedb
      slate_version: ${{ needs.build-runner.outputs.slate_version }}
    secrets: inherit

  ycsb:
    name: YCSB suite
    needs: build-runner
    permissions:
      actions: write
      contents: write
    uses: ./.github/workflows/benchmark-suite.yml
    with:
      suite: ycsb
      slate_version: ${{ needs.build-runner.outputs.slate_version }}
    secrets: inherit
